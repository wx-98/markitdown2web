services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: e2m_root_password
      MYSQL_DATABASE: e2m
      MYSQL_USER: e2m
      MYSQL_PASSWORD: e2m_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+asyncmy://e2m:e2m_password@mysql:3306/e2m
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  pptx-frontend:
    build:
      context: .
      dockerfile: Dockerfile.pptx
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
