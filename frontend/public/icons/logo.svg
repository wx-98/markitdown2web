<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc" />
      <stop offset="100%" style="stop-color:#c4b5fd" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="46" y="46" width="420" height="420" rx="84" fill="url(#bgGrad)" />

  <!-- "E" letter (top-left) -->
  <g transform="translate(0,0)">
    <path d="M 108 115 L 240 115 L 240 152 L 150 152 L 150 184 L 228 184 L 228 220 L 150 220 L 150 254 L 240 254 L 240 290 L 108 290 Z" fill="#ffffff" />
  </g>

  <!-- "2" number (top-right) -->
  <g transform="translate(0,0)">
    <path d="M 268 115 L 385 115 Q 418 115 418 146 L 418 188 Q 418 220 385 220 L 303 220 L 303 254 L 422 254 L 422 290 L 263 290 L 263 215 Q 263 183 296 183 L 376 183 L 376 154 L 268 154 Z" fill="#ffffff" />
  </g>

  <!-- "md" text below, made with clean paths -->
  <g transform="translate(0, 0)">
    <!-- "m" letter -->
    <rect x="100" y="330" width="18" height="56" rx="5" fill="url(#accentGrad)" />
    <rect x="118" y="348" width="18" height="38" rx="5" fill="url(#accentGrad)" />
    <rect x="136" y="330" width="18" height="56" rx="5" fill="url(#accentGrad)" />
    <!-- "d" letter -->
    <rect x="164" y="330" width="18" height="56" rx="5" fill="url(#accentGrad)" />
    <rect x="182" y="348" width="18" height="38" rx="5" fill="url(#accentGrad)" />
  </g>

  <!-- Arrow "?" (connecting E2 ? md) -->
  <line x1="120" y1="310" x2="280" y2="310" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" />
  <polygon points="286,310 262,296 262,324" fill="url(#accentGrad)" />
  <!-- Arrow dots -->
  <circle cx="130" cy="310" r="4" fill="url(#accentGrad)" />
  <circle cx="148" cy="310" r="4" fill="url(#accentGrad)" />
  <circle cx="166" cy="310" r="4" fill="url(#accentGrad)" />
  <circle cx="184" cy="310" r="4" fill="url(#accentGrad)" />
  <circle cx="202" cy="310" r="4" fill="url(#accentGrad)" />
  <circle cx="220" cy="310" r="4" fill="url(#accentGrad)" />
  <circle cx="238" cy="310" r="4" fill="url(#accentGrad)" />
  <circle cx="256" cy="310" r="4" fill="url(#accentGrad)" />

  <!-- Decorative elements -->
  <circle cx="70" cy="430" r="5" fill="#a5b4fc" opacity="0.35" />
  <circle cx="442" cy="100" r="6" fill="#a5b4fc" opacity="0.3" />
  <circle cx="440" cy="430" r="4" fill="#a5b4fc" opacity="0.25" />
</svg>
